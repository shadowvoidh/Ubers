<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formação</title>
    <link rel="stylesheet" href="../Css/ubers.css">
</head>
<body>
<div class="container-tatico">

    <div class="campo-ubers">

        <div class="linha ataque">
            <div class="jogador-pos barou">Barou (O Rei)</div>
        </div>

        <div class="linha S ataque">
            <div class="jogador-pos sendou">Sendou</div>
        </div>

        <div class="linha meio">
            <div class="jogador-pos abdi">Abdi</div>
            <div class="jogador-pos drago">Drago</div>
            <div class="jogador-pos peron">Peron</div>
            <div class="jogador-pos rico">Rico</div>
        </div>

        <div class="linha vol">
            <div class="jogador-pos niko">Niko</div>
        </div>

        <div class="linha defesa">
            <div class="jogador-pos aryu">Aryu</div>
            <div class="jogador-pos lorenzo">Lorenzo</div>
            <div class="jogador-pos aiku">Aiku</div>
        </div>

        <div class="linha goleiro">
            <div class="jogador-pos canali">Canali</div>
        </div>

    </div>

    <!-- CARD DO SNUFFY -->
    <div class="card-treinador">

        <div class="badge-treinador">
            Master Coach
        </div>

        <img src="../../assets/img/imgUbers/snuffy.jpg"
             alt="Marc Snuffy"
             class="foto-treinador">

        <div class="info-treinador">
            <h2>Marc Snuffy</h2>

            <p class="subtitulo">
                Estrategista Chefe
            </p>

            <div class="frase-snuffy">
                "O talento individual é apenas a engrenagem de um sistema perfeito."
            </div>
        </div>

    </div>

</div>

</body>
</html>
